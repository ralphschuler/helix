name: helix

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${HELIX_POSTGRES_DB:-helix}
      POSTGRES_USER: ${HELIX_POSTGRES_USER:-helix}
      POSTGRES_PASSWORD: ${HELIX_POSTGRES_PASSWORD:-helix_dev_password}
    ports:
      - "127.0.0.1:${HELIX_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://127.0.0.1:${HELIX_REDPANDA_KAFKA_PORT:-9092}
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "127.0.0.1:${HELIX_REDPANDA_KAFKA_PORT:-9092}:19092"
      - "127.0.0.1:${HELIX_REDPANDA_ADMIN_PORT:-9644}:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers 127.0.0.1:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    volumes:
      - redpanda-data:/var/lib/redpanda/data

volumes:
  postgres-data:
  redpanda-data:
